version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gift_ingestion
      POSTGRES_USER: gift_user
      POSTGRES_PASSWORD: gift_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data:

